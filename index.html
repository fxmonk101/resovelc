<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#012169" />
    <title>Resolva Credix — Trusted American Banking</title>
    <meta name="description" content="Resolva Credix: high-yield savings, checking, loans, credit cards, grants and international wires. FDIC insured. Member FDIC." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
  </head>
  <body>
    <div id="resolva-preloader" aria-hidden="true">
      <img src="/preloader.png" alt="" width="96" height="96" />
      <div class="rb-bar"><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.spa.tsx"></script>
    <script>
      window.addEventListener('load', function () {
        var p = document.getElementById('resolva-preloader');
        if (!p) return;
        setTimeout(function () {
          p.classList.add('rb-hide');
          setTimeout(function () { p.remove(); }, 500);
        }, 350);
      });
    </script>
  </body>
</html>
